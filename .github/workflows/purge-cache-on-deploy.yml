name: Purge Cloudflare Cache on Deploy

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'cohortle-web/**'
      - 'cohortle-api/**'
  workflow_dispatch:

jobs:
  purge-cache:
    name: Purge Cloudflare Cache and Verify Deployment
    runs-on: ubuntu-latest
    
    steps:
      - name: Wait for deployment
        run: |
          echo "⏳ Waiting 90 seconds for Coolify deployment to complete..."
          sleep 90
      
      - name: Purge Cloudflare Cache
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          ZONE_ID: 931b969b7a90e93c0eb56351db72529a
        run: |
          echo "🔄 Purging Cloudflare cache..."
          
          response=$(curl -s -X POST "https://api.cloudflare.com/client/v4/zones/${ZONE_ID}/purge_cache" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            -H "Content-Type: application/json" \
            --data '{"purge_everything":true}')
          
          if echo "$response" | grep -q '"success":true'; then
            echo "✅ Cloudflare cache purged successfully!"
          else
            echo "❌ Failed to purge Cloudflare cache"
            echo "Response: $response"
            exit 1
          fi
      
      - name: Verify deployment
        run: |
          echo "🔍 Verifying deployment..."
          
          # Check backend deployment endpoint
          echo "Checking backend..."
          backend_response=$(curl -s https://api.cohortle.com/v1/api/deployment/verify)
          if echo "$backend_response" | grep -q '"deployed":true'; then
            echo "✅ Backend deployment verified"
          else
            echo "⚠️ Backend deployment verification inconclusive"
          fi
          
          # Check frontend deployment endpoint
          echo "Checking frontend..."
          frontend_response=$(curl -s https://cohortle.com/api/deployment)
          if echo "$frontend_response" | grep -q '"deployed":true'; then
            echo "✅ Frontend deployment verified"
          else
            echo "⚠️ Frontend deployment verification inconclusive"
          fi
      
      - name: Notify completion
        if: success()
        run: |
          echo "🎉 Deployment complete, cache purged, and deployment verified!"
          echo "Your changes should be live at https://cohortle.com"
          echo ""
          echo "To verify locally, run:"
          echo "  ./verify-deployment.sh"
