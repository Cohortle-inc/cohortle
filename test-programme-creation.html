<!DOCTYPE html>
<html>
<head>
    <title>Test Programme Creation</title>
</head>
<body>
    <h1>Direct Programme Creation Test</h1>
    <button onclick="testCreateProgramme()">Test Create Programme</button>
    <div id="result"></div>

    <script>
        async function testCreateProgramme() {
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = '<p>Testing...</p>';
            
            try {
                console.log('=== STARTING DIRECT API TEST ===');
                
                // Test data
                const programmeData = {
                    name: 'Test Programme ' + Date.now(),
                    description: 'Test description',
                    start_date: '2025-03-01'
                };
                
                console.log('Request data:', programmeData);
                
                // Make direct API call through proxy
                const response = await fetch('https://cohortle.com/api/proxy/v1/api/programmes', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(programmeData),
                    credentials: 'include' // Include cookies
                });
                
                console.log('Response status:', response.status);
                console.log('Response headers:', response.headers);
                
                const data = await response.json();
                console.log('Response data:', data);
                
                if (response.ok && !data.error) {
                    resultDiv.innerHTML = `
                        <h2 style="color: green;">SUCCESS!</h2>
                        <pre>${JSON.stringify(data, null, 2)}</pre>
                    `;
                } else {
                    resultDiv.innerHTML = `
                        <h2 style="color: red;">FAILED</h2>
                        <p>Status: ${response.status}</p>
                        <pre>${JSON.stringify(data, null, 2)}</pre>
                    `;
                }
            } catch (error) {
                console.error('=== ERROR ===', error);
                resultDiv.innerHTML = `
                    <h2 style="color: red;">ERROR</h2>
                    <p>${error.message}</p>
                    <pre>${error.stack}</pre>
                `;
            }
        }
    </script>
</body>
</html>
